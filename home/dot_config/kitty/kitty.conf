# Fonts

font_family family="JetBrainsMonoNL Nerd Font" style=Medium
font_size 12.0

# Force specific fallback fonts for CJK and emoji ranges. kitty already
# auto-falls-back via fontconfig, so these only matter if a glyph renders
# with the wrong font.
symbol_map U+4E00-U+9FFF,U+3000-U+30FF,U+AC00-U+D7AF Noto Sans CJK SC
symbol_map U+1F300-U+1FAFF,U+2600-U+27BF Noto Color Emoji

# Cursor

cursor_shape block
cursor_blink_interval 0
# Keep the block cursor at the shell prompt (shell integration otherwise
# switches it to a beam).
shell_integration no-cursor

# Scrolling

scrollback_lines 10000
pixel_scroll no

# Window

window_padding_width 10
remember_window_size  no
initial_window_width  120c
initial_window_height 32c

# Shell

shell nu

# Bell

enable_audio_bell no

# Close behavior: never prompt, just close.
confirm_os_window_close 0

# Mouse: select to copy, right-click to paste.
copy_on_select clipboard
mouse_map right press ungrabbed paste_from_clipboard

# allow kitty to read/write clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary

# Colors (gruvbox)

foreground #ebdbb2
background #282828

cursor     #ebdbb2
cursor_text_color #282828

selection_foreground none
selection_background #504945

# Normal
color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984

# Bright
color8  #928374
color9  #fb4934
color10 #b8bb26
color11 #fabd2f
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #fbf1c7

# Extra (faded/neutral orange)
color16 #d65d0e
color17 #fe8019
