# yaml-language-server: $schema=./non-home.schema.json

copies:
  - name: Reflector config
    reference_url: https://wiki.archlinux.org/title/Reflector
    source: ./etc/xdg/reflector/reflector.conf
    dest: /etc/xdg/reflector/reflector.conf
    when:
      packages_installed:
        - reflector
    after_commands:
      - "sudo systemctl enable --now reflector.timer"
      - "sudo systemctl start reflector.service"

  - name: Thinkpad fan control config
    reference_url: https://wiki.archlinux.org/title/Fan_speed_control
    source: ./etc/thinkfan.conf
    dest: /etc/thinkfan.conf
    when:
      packages_installed:
        - thinkfan
    after_commands:
      - "sudo sensors-detect"
      - "sudo systemctl enable --now thinkfan.service"

  - name: Thinkpad keyboard backlight control config
    reference_url: https://github.com/VorpalBlade/keyboard-backlightd
    source: ./etc/conf.d/keyboard-backlightd
    dest: /etc/conf.d/keyboard-backlightd
    when:
      packages_installed:
        - keyboard-backlightd
    after_commands:
      - "sudo systemctl enable --now keyboard-backlightd.service"

  - name: NetworkManager connectivity URL config
    reference_url: https://wiki.archlinux.org/title/NetworkManager
    source: ./etc/NetworkManager/conf.d/10-connectivity.conf
    dest: /etc/NetworkManager/conf.d/10-connectivity.conf
    when:
      packages_installed:
        - networkmanager
    after_commands:
      - "sudo systemctl restart NetworkManager.service"
