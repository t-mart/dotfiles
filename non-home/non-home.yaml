# yaml-language-server: $schema=./non-home.schema.json

copies:
  - name: reflector
    source: ./etc/xdg/reflector/reflector.conf
    dest: /etc/xdg/reflector/reflector.conf
    when:
      packages_installed:
        - reflector
    instructions: |
      Pacman mirror updater config installed.

      Next steps:

      sudo systemctl enable --now reflector.timer
      sudo systemctl start reflector.service

      See https://wiki.archlinux.org/title/Reflector for details.

  - name: thinkfan
    source: ./etc/thinkfan.conf
    dest: /etc/thinkfan.conf
    when:
      packages_installed:
        - thinkfan
    instructions: |
      Thinkpad fan config installed.
      
      Next steps:

      sensors-detect
      sudo systemctl enable --now thinkfan.service

      See https://wiki.archlinux.org/title/Fan_speed_control for details.

  - name: keyboard-backlightd
    source: ./etc/conf.d/keyboard-backlightd
    dest: /etc/conf.d/keyboard-backlightd
    when:
      packages_installed:
        - keyboard-backlightd
    instructions: |
      Thinkpad keyboard backlight control config installed.

      Next steps:

      sudo systemctl enable --now keyboard-backlightd.service

      See https://github.com/VorpalBlade/keyboard-backlightd for details.

  - name: networkmanager-connectivity-url
    source: ./etc/NetworkManager/conf.d/10-connectivity.conf
    dest: /etc/NetworkManager/conf.d/10-connectivity.conf
    when:
      packages_installed:
        - networkmanager
    instructions: |
      NetworkManager connectivity URL config installed.

      Next steps:

      sudo systemctl restart NetworkManager.service

      See https://wiki.archlinux.org/title/NetworkManager for details.