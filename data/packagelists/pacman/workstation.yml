# yaml-language-server: $schema=./.pacman-packagelist.schema.json

# Installed where I actually work: development and media manipulation.
# Gated on the isWorkstation prompt.
#
# Placement rule: non-GUI tools that I only want on machines where I write code
# or process media — language runtimes, dev CLIs, media-processing tools. This
# axis is orthogonal to graphical: a headless dev server is a workstation but
# not graphical. If a package needs a display, it goes in graphical.yml; if it's
# useful even on a minimal headless box, it goes in base.yml.

- "1password-cli" # password manager CLI
- "atomicparsley" # media file tagger (yt-dlp dependency)
- "bun" # JavaScript runtime
- "deno" # JavaScript runtime
- "ffmpeg" # media processing
- "gallery-dl-bin" # image downloader
- "github-cli" # GitHub CLI tool
- "go" # programming language
- "hyperfine" # command-line benchmarking tool
- "imagemagick" # image manipulation
- "jwt-cli" # decode and encode JWTs 
- "lazygit" # terminal UI for git
- "nodejs" # JavaScript runtime
- "pnpm" # JavaScript package manager
- "rtmpdump" # RTMP streaming tool (yt-dlp dependency)
- "rust" # programming language
- "terraform" # infrastructure as code tool
- "magic-wormhole" # secure file transfer tool
