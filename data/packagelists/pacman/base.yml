# yaml-language-server: $schema=./.pacman-packagelist.schema.json

# Installed on every machine, no questions asked.
#
# Placement rule: a package belongs here only if it is useful on a minimal,
# headless box (no display, no development).

- "age" # encryption tool
- "atuin" # shell history manager
- "bat" # enhanced cat command
- "btop" # resource monitor
- "brotli" # file compression tool
- "cadvisor-bin" # container monitoring tool
- "carapace-bin" # shell completion tool
- "cargo-update" # Rust crate updater
- "curl" # HTTP tool
- "docker" # containerization platform
- "docker-buildx" # extended build capabilities for Docker
- "docker-compose" # multi-container Docker applications
- "python-dotenv" # load environment variables from .env files
- "duf" # enhanced df utility
- "dust" # enhanced du utility
- "erdtree" # enhanced tree command
- "fastfetch" # system information tool
- "fclones" # file deduplication tool (hardlinks)
- "fd" # alternative to find
- "fpart" # FS partitioner. makes rsync parallelizable
- "fzf" # command-line fuzzy finder
- "geoipupdate" # GeoIP database updater (requires setup of /etc/GeoIP.conf)
- "git" # version control system
- "git-delta" # syntax-highlighting pager for git and diff output
- "gnupg" # encryption and signing tool
- "gping" # ping with a graph
- "gum" # CLI builder
- "gzip" # file compression tool
- "jq" # command-line JSON processor
- "lazydocker" # terminal UI for docker
- "lnav" # log file navigator
- "mkinitcpio-firmware" # firmware hooks for mkinitcpio (fixes warnings)
- "ncdu" # interactive disk usage analyzer
- "neovim" # text editor
- "nushell" # modern shell
- "oh-my-posh-bin" # prompt theme engine
- "ouch" # unified archive tool
- "procs" # ps alternative written
- "prometheus-node-exporter" # Prometheus exporter for hardware and OS metrics
- "q-dns-bin" # DNS query tool
- "ranger" # terminal file manager
- "reflector" # retrieve and filter the latest Pacman mirror list
- "ripgrep" # regex search tool
- "sudo-rs" # modern sudo written in Rust
- "systemctl-tui" # systemd services and logs TUI
- "trippy" # network diagnostic tool (command is trip)
- "unrar" # decompression tool
- "unzip" # file decompression tool
- "uv" # make python gud
- "vivid" # terminal color scheme manager
- "xz" # file compression tool
- "yq" # YAML processor
- "zip" # file compression tool
- "zoxide" # smarter cd command
- "zstd" # file compression tool
